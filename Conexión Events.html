<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conexión Events</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0a0a0a;
      position:relative;
    }

    /* Fondo animado elegante */
    .ondas{
      position:absolute;
      width:200%;
      height:200%;
      background:
      radial-gradient(circle at center,
      rgba(255,215,0,0.10) 0%,
      transparent 35%);
      animation:girar 18s linear infinite;
    }

    .ondas2{
      position:absolute;
      width:180%;
      height:180%;
      border:2px solid rgba(255,215,0,0.08);
      border-radius:50%;
      animation:pulsar 6s ease-in-out infinite;
    }

    .contenedor{
      position:relative;
      z-index:10;
      text-align:center;
      padding:40px;
      animation:entrada 2s ease;
    }

    h1{
      color:#ffd700;
      font-size:clamp(3rem,7vw,6rem);
      text-transform:uppercase;
      letter-spacing:6px;
      text-shadow:
      0 0 10px #ffd700,
      0 0 20px #ffae00,
      0 0 40px #ff8800;
      animation:subirBajar 4s ease-in-out infinite;
    }

    p{
      margin-top:20px;
      color:#fff0b3;
      font-size:1.4rem;
      letter-spacing:4px;
      animation:desvanecer 3s infinite alternate;
    }

    .linea{
      width:300px;
      height:4px;
      margin:30px auto;
      border-radius:20px;
      background:linear-gradient(90deg,
      transparent,
      #ffd700,
      transparent);
      animation:brilloLinea 2s linear infinite;
    }

    /* Botón elegante */
    .btn{
      margin-top:40px;
      padding:16px 40px;
      border:none;
      border-radius:60px;
      background:#ffd700;
      color:#111;
      font-size:1rem;
      font-weight:bold;
      letter-spacing:2px;
      cursor:pointer;
      transition:0.5s;
      position:relative;
      overflow:hidden;
      box-shadow:
      0 0 15px #ffd700;
    }

    .btn:hover{
      transform:translateY(-8px) scale(1.08);
      box-shadow:
      0 0 20px #ffd700,
      0 0 50px #ffae00;
    }

    .btn::before{
      content:'';
      position:absolute;
      top:0;
      left:-120%;
      width:100%;
      height:100%;
      background:rgba(255,255,255,0.4);
      transform:skewX(-30deg);
      transition:0.7s;
    }

    .btn:hover::before{
      left:130%;
    }

    /* Animaciones */

    @keyframes girar{
      from{
        transform:rotate(0deg);
      }

      to{
        transform:rotate(360deg);
      }
    }

    @keyframes pulsar{
      0%{
        transform:scale(0.8);
        opacity:0.3;
      }

      50%{
        transform:scale(1);
        opacity:1;
      }

      100%{
        transform:scale(1.2);
        opacity:0.2;
      }
    }

    @keyframes subirBajar{
      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-12px);
      }

      100%{
        transform:translateY(0px);
      }
    }

    @keyframes desvanecer{
      from{
        opacity:0.5;
      }

      to{
        opacity:1;
      }
    }

    @keyframes brilloLinea{
      0%{
        opacity:0.4;
        width:180px;
      }

      50%{
        opacity:1;
        width:320px;
      }

      100%{
        opacity:0.4;
        width:180px;
      }
    }

    @keyframes entrada{
      from{
        opacity:0;
        transform:scale(0.8);
      }

      to{
        opacity:1;
        transform:scale(1);
      }
    }

  </style>
</head>

<body>

  <div class="ondas"></div>
  <div class="ondas2"></div>

  <div class="contenedor">

    <h1>Conexión Events</h1>

    <div class="linea"></div>

    <p>Próximamente Estaran Disponibles Los Eventos De Este Apartado</p>

    <button class="btn">
      ⬅ Regresar al Inicio
    </button>

  </div>

</body>
</html>

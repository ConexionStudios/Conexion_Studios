<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conexión Entertaiment</title>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(-45deg,#05000f,#1a0033,#2d0057,#120024);
background-size:400% 400%;
animation:fondo 10s ease infinite;
font-family:Arial;
}

.contenedor{
text-align:center;
}

h1{
font-size:5rem;
color:white;
text-shadow:0 0 25px #b84dff;
animation:zoom 3s infinite alternate;
}

p{
color:#f0d9ff;
font-size:1.5rem;
margin-top:20px;
}

.btn{
margin-top:40px;
padding:15px 35px;
border:none;
border-radius:50px;
background:linear-gradient(90deg,#7b2cff,#c84dff);
color:white;
font-size:1rem;
cursor:pointer;
transition:.4s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 30px #c84dff;
}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.08);}
}

</style>
</head>

<body>

<div class="contenedor">
<h1>Conexión Entretenimiento</h1>
<p>Proximamente Disponible El Entretenimiento</p>

<button class="btn">
⬅ Regresar al Inicio
</button>
</div>

</body>
</html>

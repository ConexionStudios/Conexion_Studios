<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conexión Collaborations</title>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(-45deg,#000000,#240000,#4b0000,#120000);
background-size:400% 400%;
animation:fondo 9s ease infinite;
font-family:Arial;
}

.contenedor{
text-align:center;
}

h1{
font-size:5rem;
color:white;
text-shadow:0 0 25px #ff1e1e;
animation:latido 2s infinite;
}

p{
color:#ffd6d6;
font-size:1.5rem;
margin-top:20px;
}

.btn{
margin-top:40px;
padding:15px 35px;
border:none;
border-radius:50px;
background:linear-gradient(90deg,#ff1e1e,#ff4d4d);
color:white;
font-size:1rem;
cursor:pointer;
transition:.4s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 35px #ff1e1e;
}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

@keyframes latido{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

</style>
</head>

<body>

<div class="contenedor">
<h1>Conexión Colaboraciones</h1>
<p>Próximamente Disponible</p>

<button class="btn">
⬅ Regresar al Inicio
</button>
</div>

</body>
</html>

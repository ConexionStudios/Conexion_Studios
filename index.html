<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Conexión Studios - música, series y experiencias en un solo espacio.">
    <title>Conexión Studios - Oficial</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="Imagenes/Logotipos/Icono.png" type="Icono de Conexión Studios">
</head>
<body>
    <div class="background"></div>
    <div class="particles" id="particles"></div>

    <header>
        <div class="logo">Conexión Studios</div>
    </header>

    <main>
        <section id="hero">
            <div class="hero-content">
                <div class="hero-visual">
                    <img id="hero-logo" class="hero-logo" src="Imagenes/Logotipos/Logo.jpg" alt="Logo de Conexión Studios">
                </div>
                <h1>Conexión Studios</h1>
                <p class="tagline">Música • Series • Entretenimiento</p>
            </div>
        </section>

        <section id="musica" class="section-shell">
            <h2 class="section-title music">Música &amp; Álbumes</h2>
            <div class="horizontal-scroll" id="musica-scroll"></div>
        </section>

        <section id="miniseries" class="section-shell">
            <h2 class="section-title series">Miniseries</h2>
            <div class="horizontal-scroll" id="miniseries-scroll"></div>
        </section>

        <section id="eventos" class="section-shell">
            <h2 class="section-title events">Actualizaciones</h2>
            <div class="events-roulette">
                <div class="roulette-nav" aria-hidden="true">
                    <div class="roulette-line"></div>
                    <div class="roulette-dots" id="roulette-dots"></div>
                </div>
                <div class="roulette-viewport" id="eventos-roulette">
                    <div class="roulette-list" id="eventos-container"></div>
                </div>
            </div>
        </section>

        <section id="redes" class="section-shell">
            <h2 class="section-title social">Redes Sociales • Oficiales</h2>
            <div class="redes-scroll" id="redes-scroll"></div>
        </section>

        <section id="colaboraciones" class="section-shell">
            <h2 class="section-title collabs">Colaboraciones</h2>
            <div class="collabs-grid" id="colaboraciones-list"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Conexión Studios • Todos los derechos reservados</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>

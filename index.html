<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Conexión Studios - Próximamente</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(-45deg, #000000, #001f4d, #000814, #003b8b);
      background-size: 400% 400%;
      animation: fondoAnimado 12s ease infinite;
      position:relative;
    }

    /* Partículas */
    body::before,
    body::after{
      content:'';
      position:absolute;
      width:200%;
      height:200%;
      background-repeat: repeat;
      opacity:0.15;
      animation: moverParticulas 25s linear infinite;
    }

    body::before{
      background-image:
      radial-gradient(circle, #00aaff 2px, transparent 2px);
      background-size: 80px 80px;
    }

    body::after{
      background-image:
      radial-gradient(circle, #ffffff 1px, transparent 1px);
      background-size: 120px 120px;
      animation-direction: reverse;
    }

    .contenedor{
      text-align:center;
      z-index:2;
      padding:40px;
    }

    h1{
      color:white;
      font-size: clamp(2rem, 6vw, 5rem);
      text-transform:uppercase;
      letter-spacing:5px;
      animation: brillo 3s ease-in-out infinite alternate,
                 entrada 2s ease;
      text-shadow:
      0 0 10px #00aeff,
      0 0 20px #0077ff,
      0 0 40px #0051ff;
    }

    p{
      margin-top:20px;
      color:#cfdfff;
      font-size: clamp(1rem, 2vw, 1.5rem);
      letter-spacing:3px;
      animation: aparecer 4s infinite alternate;
    }

    /* Línea brillante */
    .linea{
      width:250px;
      height:4px;
      margin:25px auto;
      border-radius:10px;
      background: linear-gradient(90deg, transparent, #00aaff, transparent);
      animation: lineaGlow 2s linear infinite;
    }

    /* Animaciones */
    @keyframes fondoAnimado{
      0%{
        background-position:0% 50%;
      }
      50%{
        background-position:100% 50%;
      }
      100%{
        background-position:0% 50%;
      }
    }

    @keyframes brillo{
      from{
        transform:scale(1);
        text-shadow:
        0 0 10px #00aeff,
        0 0 20px #0077ff;
      }

      to{
        transform:scale(1.05);
        text-shadow:
        0 0 20px #00c3ff,
        0 0 40px #0088ff,
        0 0 60px #0044ff;
      }
    }

    @keyframes entrada{
      from{
        opacity:0;
        transform:translateY(40px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes aparecer{
      from{
        opacity:0.5;
      }

      to{
        opacity:1;
      }
    }

    @keyframes moverParticulas{
      from{
        transform:translate(0,0);
      }

      to{
        transform:translate(-200px,-200px);
      }
    }

    @keyframes lineaGlow{
      0%{
        transform:translateX(-20px);
        opacity:0.5;
      }

      50%{
        transform:translateX(20px);
        opacity:1;
      }

      100%{
        transform:translateX(-20px);
        opacity:0.5;
      }
    }
  </style>
</head>

<body>

  <div class="contenedor">
    <h1>Conexión Studios</h1>

    <div class="linea"></div>

    <p>Página Oficial Próximamente</p>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conexión Music</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(-45deg,#000000,#001f4d,#000814,#003b8b);
background-size:400% 400%;
animation:fondo 12s ease infinite;
}

.contenedor{
text-align:center;
animation:entrada 2s ease;
}

h1{
font-size:5rem;
color:white;
text-shadow:0 0 20px #00aeff;
animation:brillo 3s infinite alternate;
}

p{
color:#cfdfff;
font-size:1.5rem;
margin-top:20px;
}

.btn{
margin-top:40px;
padding:15px 35px;
border:none;
border-radius:50px;
background:linear-gradient(90deg,#0077ff,#00c3ff);
color:white;
cursor:pointer;
font-size:1rem;
transition:.4s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 30px #00aaff;
}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

@keyframes brillo{
from{transform:scale(1);}
to{transform:scale(1.05);}
}

@keyframes entrada{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="contenedor">
<h1>Conexión Music</h1>
<p>Apartado Próximamente Disponible</p>

<button class="btn">
⬅ Regresar al Inicio
</button>
</div>

</body>
</html>

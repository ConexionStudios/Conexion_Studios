<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conexión Video Games</title>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(-45deg,#000000,#001a0f,#00331f,#00150d);
background-size:400% 400%;
animation:fondo 12s ease infinite;
font-family:Arial;
}

.contenedor{
text-align:center;
}

h1{
font-size:5rem;
color:white;
text-shadow:0 0 25px #00ff99;
animation:matrix 2s infinite alternate;
}

p{
color:#c8ffe8;
font-size:1.5rem;
margin-top:20px;
}

.btn{
margin-top:40px;
padding:15px 35px;
border:none;
border-radius:50px;
background:linear-gradient(90deg,#00ff99,#00cc66);
color:black;
font-size:1rem;
font-weight:bold;
cursor:pointer;
transition:.4s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 35px #00ff99;
}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

@keyframes matrix{
from{
letter-spacing:3px;
}
to{
letter-spacing:8px;
}
}

</style>
</head>

<body>

<div class="contenedor">
<h1>Conexión Gaming</h1>
<p>Próximamente Disponible Para Nuevos Retos y Torneos</p>

<button class="btn">
⬅ Regresar al Inicio
</button>
</div>

</body>
</html>
